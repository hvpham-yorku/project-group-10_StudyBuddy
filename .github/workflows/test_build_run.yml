name: TEST BUILD RUN

on: [push, pull_request]

jobs:
  test_build_run:
    runs-on: ubuntu-latest

    steps:
    # Step 0. Get the repository code
    - uses: actions/checkout@v4

    # Step 1. Setup Java Environment with JDK 21
    - name: Java Setup
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Step 1.5. Inject Firebase Credentials
    - name: Create Firebase Service Account File
      env:
        FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      run: |
        mkdir -p ./StudyBuddy/src/main/resources
        echo "$FIREBASE_SECRET" > ./StudyBuddy/src/main/resources/serviceAccountKey.json

    # # Step 2. Run the unit tests
    - name: Unit Tests
      run: |
        cd ./StudyBuddy
        chmod +x mvnw
        ./mvnw test \
          -Dspring.mail.host=localhost \
          -Dspring.mail.port=2525 \
          -Dspring.mail.username=dummy \
          -Dspring.mail.password=dummy \
          -Dfirebase.credentials.path=classpath:serviceAccountKey.json

    # Step 3. Build the Docker Image
    - name: Docker Build
      run: docker build -t app .

    # --- !!! Push to DockerHub ONLY if it's working!1!1!

    # Step 4. Login to Docker Hub
    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/deployment'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    # Step 5. Push to (Vaughn's) Docker Hub
    - name: Push to Docker Hub
      if: github.ref == 'refs/heads/deployment'
      uses: docker/build-push-action@v5
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        context: .
        push: true
        tags: |
          tenaciousvirtue/studybuddy:latest
          tenaciousvirtue/studybuddy:${{ vars.VERSION }}
        build-args: |
          VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
